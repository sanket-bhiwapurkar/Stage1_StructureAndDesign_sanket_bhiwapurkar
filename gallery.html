<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- External styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body data-page="gallery">
    <div class="root">
        <!-- Header -->
        <div id="header"></div>
        <!-- End Header -->
        <main class="container-fluid">
            <section class="page-hero text-white d-flex align-items-center">
                <div class="container-fluid text-center py-5">

                    <h1 class="display-4 fw-bold">
                        Our Gallery
                    </h1>

                    <p class="lead text-white-50 mt-3">
                        Moments from workshops, hackathons, and events that shaped our journey.
                    </p>

                    <div class="mt-4">
                        <a href="#gallery" class="btn btn-light px-4">
                            Explore Photos
                        </a>
                    </div>

                </div>
            </section>
            <section id="gallery" class="py-5 container-fluid">

                <!-- TABS -->
                <ul class="nav nav-pills mb-4 justify-content-center" id="galleryTabs" role="tablist">

                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#workshops">
                            Workshops
                        </button>
                    </li>

                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#hackathons">
                            Hackathons
                        </button>
                    </li>

                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#events">
                            Events
                        </button>
                    </li>

                </ul>

                <!-- TAB CONTENT -->
                <div class="tab-content">

                    <!-- WORKSHOPS -->
                    <div class="tab-pane fade show active" id="workshops">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <img src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg"
                                    class="img-fluid rounded gallery-img">
                            </div>

                            <div class="col-md-6">
                                <div class="row g-3">

                                    <div class="col-6">
                                        <img src="https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg"
                                            class="img-fluid rounded gallery-img">
                                    </div>

                                    <div class="col-6">
                                        <img src="https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg"
                                            class="img-fluid rounded gallery-img">
                                    </div>

                                    <div class="col-6">
                                        <img src="https://images.pexels.com/photos/1181406/pexels-photo-1181406.jpeg"
                                            class="img-fluid rounded gallery-img">
                                    </div>

                                    <div class="col-6">
                                        <img src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg"
                                            class="img-fluid rounded gallery-img">
                                    </div>

                                </div>
                            </div>

                        </div>

                    </div>

                    <!-- HACKATHONS -->
                    <div class="tab-pane fade" id="hackathons">

                        <!-- same layout, different images -->
                        <div class="row g-3">
                            <div class="col-md-6">
                                <img src="https://images.pexels.com/photos/14612128/pexels-photo-14612128.jpeg"
                                    class="img-fluid rounded gallery-img">
                            </div>
                            <div class="col-md-6">
                                <div class="row g-3">
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/5530483/pexels-photo-5530483.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/1181406/pexels-photo-1181406.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- EVENTS -->
                    <div class="tab-pane fade" id="events">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <img src="https://images.pexels.com/photos/26559578/pexels-photo-26559578.jpeg"
                                    class="img-fluid rounded gallery-img">
                            </div>
                            <div class="col-md-6">
                                <div class="row g-3">
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/5530483/pexels-photo-5530483.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                    <div class="col-6"><img
                                            src="https://images.pexels.com/photos/1181406/pexels-photo-1181406.jpeg"
                                            class="img-fluid rounded gallery-img"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </section>
        </main>
        <!-- Footer -->
        <div id="footer"></div>
        <!-- End Footer -->
    </div>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <!-- External script -->
    <script src="components.js"></script>
    <script src="main.js"></script>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
